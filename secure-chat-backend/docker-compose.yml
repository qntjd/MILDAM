services:

  postgres:
    image: postgres:16-alpine
    container_name: securechat-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: securechat
      POSTGRES_USER: chatuser
      POSTGRES_PASSWORD: changeme
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatuser -d securechat"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: securechat-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass changeme
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "changeme", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: